name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Проверка кода перед деплоем ──────────────────────────────────────────────
  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Деплой на VPS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          FASTAPI_SECRET_KEY: ${{ secrets.FASTAPI_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 12m
          envs: POSTGRES_PASSWORD,AUTH_SECRET,ADMIN_USER,ADMIN_PASSWORD,BLOB_READ_WRITE_TOKEN,RESEND_API_KEY,NOTIFICATION_EMAIL,FASTAPI_SECRET_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID
          script: |
            set -e
            cd /home/deploy/yourharmony

            echo "==> Writing .env from CI secrets..."
            printf 'POSTGRES_PASSWORD=%s\nAUTH_SECRET=%s\nADMIN_USER=%s\nADMIN_PASSWORD=%s\nBLOB_READ_WRITE_TOKEN=%s\nRESEND_API_KEY=%s\nNOTIFICATION_EMAIL=%s\nFASTAPI_SECRET_KEY=%s\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_ID=%s\n' \
              "$POSTGRES_PASSWORD" \
              "$AUTH_SECRET" \
              "$ADMIN_USER" \
              "$ADMIN_PASSWORD" \
              "$BLOB_READ_WRITE_TOKEN" \
              "$RESEND_API_KEY" \
              "$NOTIFICATION_EMAIL" \
              "$FASTAPI_SECRET_KEY" \
              "$TELEGRAM_BOT_TOKEN" \
              "$TELEGRAM_CHAT_ID" \
              > .env

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding and starting containers (migrator runs automatically)..."
            # migrator запускается автоматически через depends_on перед nextjs
            docker compose up -d --build

            echo "==> Health check..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
                echo "Next.js is up (HTTP $STATUS)"
                break
              fi
              echo "Waiting for Next.js... attempt $i (HTTP $STATUS)"
              sleep 10
            done

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "FastAPI is up (HTTP $STATUS)"
            else
              echo "WARNING: FastAPI health check returned HTTP $STATUS"
            fi

            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo "==> Deploy complete"
