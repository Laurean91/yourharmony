name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  # ── Проверка кода перед деплоем ──────────────────────────────────────────────
  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── Деплой на VPS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 12m
          script: |
            set -e
            cd /home/deploy/yourharmony

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Rebuilding containers..."
            docker compose up -d --build

            echo "==> Running database migrations..."
            docker compose exec -T nextjs npx prisma migrate deploy

            echo "==> Health check..."
            sleep 10
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
                echo "Next.js is up (HTTP $STATUS)"
                break
              fi
              echo "Waiting for Next.js... attempt $i (HTTP $STATUS)"
              sleep 10
            done

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "FastAPI is up (HTTP $STATUS)"
            else
              echo "WARNING: FastAPI health check returned HTTP $STATUS"
            fi

            echo "==> Cleaning up dangling images..."
            docker image prune -f

            echo "==> Deploy complete"
