# ── HTTP → HTTPS редирект ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourharmony-english.ru www.yourharmony-english.ru api.yourharmony-english.ru;

    # Для получения SSL-сертификата через certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Next.js ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name yourharmony-english.ru www.yourharmony-english.ru;

    ssl_certificate /etc/letsencrypt/live/yourharmony-english.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourharmony-english.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 20M;

    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── FastAPI ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.yourharmony-english.ru;

    ssl_certificate /etc/letsencrypt/live/yourharmony-english.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourharmony-english.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 10M;

    location / {
        proxy_pass http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
